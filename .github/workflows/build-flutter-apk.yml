# =============================================================================
# SRIBEESonline — Flutter Android APK Builder
#
# Triggers on every push to `main`, on a version tag (v1.0.0), or manually via
# the GitHub Actions "Run workflow" button.
#
# NOTE ON PATHS: in this standalone repository the Flutter project IS the repo
# root — pubspec.yaml sits at the top level. The previous version of this file
# was carried over from the monorepo layout and ran `cd mobile` in every step,
# which cannot work here: there is no `mobile/` directory to descend into. The
# steps below therefore run at the root, and the artifact path drops the prefix.
#
# Outputs:
#   Downloadable 'app-release.apk' run artifact
# =============================================================================

name: Build Flutter Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build Android Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Verify Flutter & Environment
        run: flutter doctor -v

      - name: Fetch Flutter Dependencies
        run: flutter pub get

      - name: Analyze
        # Surfaces a compile error in seconds rather than after a long Gradle
        # build. Infos/warnings are pre-existing across the app, so only genuine
        # errors fail the run.
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run Build Runner / Code Generation
        # freezed/json_serializable outputs are committed, so this is a
        # consistency check rather than a hard requirement.
        run: flutter pub run build_runner build --delete-conflicting-outputs || echo "Proceeding without build_runner..."

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sribeesonline-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
          if-no-files-found: error
