name: sribees_mobile
description: SRIBEESonline - Multi-branch grocery delivery app for Sri Lanka.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.3+1

  # Local Storage
  shared_preferences: ^2.3.1
  hive_flutter: ^1.1.0

  # Video
  video_player: ^2.9.1

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  # firebase_crashlytics: ^4.2.0
  # firebase_analytics: ^11.4.0

  # Error Tracking
  sentry_flutter: ^8.12.0

  # Connectivity
  connectivity_plus: ^6.1.0

  # Serialisation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Cupertino Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Linting
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

